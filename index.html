<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { text-align: center; margin-bottom: 1.5rem; }
    .container { max-width: 900px; margin: 0 auto; }
    .upload-area {
      border: 2px dashed #aaa;
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: #4a90d9;
      background: #eef4fc;
    }
    .upload-area p { font-size: 1.1rem; color: #666; }
    .upload-area input { display: none; }
    #status {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      color: #555;
      min-height: 1.4em;
    }
    .progress-bar-container {
      width: 100%;
      background: #ddd;
      border-radius: 6px;
      margin-top: 0.5rem;
      height: 8px;
      display: none;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4a90d9;
      border-radius: 6px;
      transition: width 0.2s;
    }
    #preview-section {
      display: none;
      margin-top: 1.5rem;
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
    }
    #preview-section h2 { margin-bottom: 1rem; }
    #preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    #preview-container img, #preview-container canvas {
      max-width: 200px;
      max-height: 200px;
      border: 1px solid #ddd;
      border-radius: 6px;
      object-fit: contain;
    }
    #result-section {
      display: none;
      margin-top: 1.5rem;
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
    }
    #result-section h2 { margin-bottom: 1rem; }
    #ocr-output {
      width: 100%;
      min-height: 200px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: vertical;
      background: #fafafa;
    }
    .actions { margin-top: 1rem; display: flex; gap: 0.75rem; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #4a90d9;
      color: #fff;
      transition: background 0.2s;
    }
    button:hover { background: #357ab8; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    button.secondary { background: #6c757d; }
    button.secondary:hover { background: #565e64; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#128269; OCR Demo</h1>

    <div class="upload-area" id="drop-zone">
      <p>Drop an image or PDF here, or click to select</p>
      <input type="file" id="file-input" accept="image/*,.pdf">
    </div>

    <div id="status"></div>
    <div class="progress-bar-container" id="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="preview-section">
      <h2>Preview</h2>
      <div id="preview-container"></div>
    </div>

    <div id="result-section">
      <h2>Extracted Text</h2>
      <textarea id="ocr-output" readonly></textarea>
      <div class="actions">
        <button id="copy-btn">Copy Text</button>
        <button id="clear-btn" class="secondary">Clear</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
